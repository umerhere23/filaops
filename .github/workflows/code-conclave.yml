name: Code Conclave Review

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  review:
    runs-on: windows-latest
    
    steps:
    - name: Checkout FilaOps
      uses: actions/checkout@v4
    
    - name: Checkout Code Conclave
      uses: actions/checkout@v4
      with:
        repository: Blb3D/review-council
        path: .code-conclave-tool
    
    - name: Install Claude Code CLI
      shell: pwsh
      run: |
        # Install Node.js LTS if not present (Windows runners have it)
        Write-Host "Installing Claude Code CLI..."
        npm install -g @anthropic-ai/claude-code
        claude --version
    
    - name: Run Code Conclave
      shell: pwsh
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        .\.code-conclave-tool\cli\ccl.ps1 `
          -Project ${{ github.workspace }} `
          -Agent guardian `
          -OutputFormat junit `
          -CI
    
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: always()
      with:
        files: '**/.code-conclave/reviews/conclave-results.xml'
    
    - name: Upload Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-conclave-reports
        path: .code-conclave/reviews/
