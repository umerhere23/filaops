name: Code Conclave Review

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Manual trigger

jobs:
  review:
    runs-on: windows-latest
    
    steps:
    - name: Checkout FilaOps
      uses: actions/checkout@v4
    
    - name: Checkout Code Conclave
      uses: actions/checkout@v4
      with:
        repository: Blb3D/review-council
        ref: ca1d8f0626ce50c3482d89638be4a6ad354788d2  # Pin to audited commit; update SHA after review
        token: ${{ secrets.REVIEW_COUNCIL_TOKEN }}
        path: .code-conclave-tool
    
    - name: Run Code Conclave
      shell: pwsh
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        .\.code-conclave-tool\cli\ccl.ps1 `
          -Project ${{ github.workspace }} `
          -Agent guardian `
          -OutputFormat junit `
          -CI
      continue-on-error: true
    
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: always()
      with:
        files: '**/.code-conclave/reviews/conclave-results.xml'
    
    - name: Upload Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-conclave-reports
        path: .code-conclave/reviews/