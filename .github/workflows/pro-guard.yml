name: PRO Code Guard

on:
  pull_request:
    branches: [main]

jobs:
  check-pro-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for PRO code in public repo
        run: |
          FOUND=0
          if [ -d "backend/app/pro" ]; then
            echo "::error::backend/app/pro/ directory found — PRO code must not be in the public repo"
            FOUND=1
          fi
          if [ -d "license-server" ]; then
            echo "::error::license-server/ directory found — billing infrastructure must not be in the public repo"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "No PRO code detected — public repo is clean"
