version: '3.8'

services:
  db:
    image: postgres:16
    container_name: filaops-db
    environment:
      POSTGRES_DB: ${DB_NAME:-filaops}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - filaops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - filaops-network

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filaops-migrate
    command: ["bash", "scripts/docker-migrate.sh"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-filaops}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      # PRO — set FILAOPS_LICENSE_KEY in .env to auto-download and activate
      FILAOPS_LICENSE_KEY: ${FILAOPS_LICENSE_KEY:-}
      DATABASE_URL: postgresql+psycopg://${DB_USER:-postgres}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-filaops}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - filaops-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filaops-backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-filaops}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      FILAOPS_VERSION: ${FILAOPS_VERSION:-}
      # PRO — set FILAOPS_LICENSE_KEY in .env to auto-download and activate
      FILAOPS_LICENSE_KEY: ${FILAOPS_LICENSE_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./uploads:/app/uploads
    networks:
      - filaops-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: filaops-frontend
    ports:
      - "80:8080"
    depends_on:
      - backend
    networks:
      - filaops-network

volumes:
  filaops_pgdata:
    name: filaops_pgdata

networks:
  filaops-network:
    name: filaops-network
